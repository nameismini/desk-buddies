<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>트레이딩</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Pretendard","Malgun Gothic",system-ui,sans-serif; background:#0f1115; color:#e8eaf0; height:100vh; display:flex; flex-direction:column; font-size:13px; }
  header { display:flex; align-items:center; gap:10px; padding:12px 16px; background:linear-gradient(135deg,#1b1e26,#14161c); border-bottom:1px solid #23262f; }
  header img { width:38px; height:38px; border-radius:50%; object-fit:cover; background:#222; }
  header .t { font-weight:700; font-size:15px; }
  header .s { font-size:11px; color:#8b90a0; }
  .body { flex:1; overflow-y:auto; padding:16px; }
  .run { width:100%; background:linear-gradient(135deg,#16c784,#0fa968); border:none; color:#fff; font-size:15px; font-weight:800; padding:16px; border-radius:14px; cursor:pointer; box-shadow:0 6px 18px rgba(22,199,132,.25); }
  .run:hover { filter:brightness(1.05); }
  .status { margin-top:14px; padding:11px 13px; border-radius:10px; background:#171a21; font-size:12px; line-height:1.5; min-height:20px; color:#cfd3dc; }
  .status.ok { border-left:3px solid #16c784; }
  .status.err { border-left:3px solid #ff5a5a; }
  .section-title { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#828799; margin:20px 2px 8px; font-weight:700; }
  label { display:block; font-size:11px; color:#9aa0b0; margin:9px 0 3px; }
  input { width:100%; background:#1d2129; border:1px solid #2a2e39; color:#fff; border-radius:8px; padding:8px 11px; font-size:12px; outline:none; }
  .save { margin-top:14px; width:100%; background:#2d6cff; border:none; color:#fff; padding:9px; border-radius:9px; font-weight:700; cursor:pointer; }
  .hint { font-size:10px; color:#6f7484; margin-top:6px; line-height:1.5; }
</style>
</head>
<body>
  <header>
    <img src="assets/male_2.png" alt="" />
    <div>
      <div class="t">트레이더</div>
      <div class="s">자동매매 프로젝트 실행기</div>
    </div>
  </header>

  <div class="body">
    <button class="run" id="run">▶  자동매매 실행</button>
    <div class="status" id="status">아래에서 파이썬 경로와 스크립트를 먼저 설정하세요.</div>

    <div class="section-title">연동 설정</div>
    <label>파이썬 실행 파일</label>
    <input id="python" placeholder="python  (또는 py / C:\\Python\\python.exe)" />
    <label>자동매매 진입 스크립트 경로</label>
    <input id="script" placeholder="C:\\projects\\autotrade\\main.py" />
    <label>실행 인자 (선택, 공백 구분)</label>
    <input id="args" placeholder="--mode live --coin BTC" />
    <button class="save" id="save">설정 저장</button>
    <div class="hint">
      이 버튼은 본인이 따로 만들고 있는 파이썬 자동매매 프로젝트를 새 프로세스로 실행만 해요.
      매매 로직·API 키·리스크 관리는 그 프로젝트 안에서 처리하세요.
      실거래 연결 전에 반드시 모의/소액으로 충분히 검증하시길 권합니다.
    </div>
  </div>

<script>
  let cfg = null;
  const $ = (id) => document.getElementById(id);

  async function init() {
    cfg = await window.api.getConfig();
    $('python').value = cfg.pythonPath || 'python';
    $('script').value = cfg.tradingScript || '';
    $('args').value = cfg.tradingArgs || '';
    if (cfg.tradingScript) $('status').textContent = '준비됨: ' + cfg.tradingScript;
  }

  $('run').addEventListener('click', async () => {
    const r = await window.api.launchTrading();
    const s = $('status');
    s.textContent = r.msg;
    s.className = 'status ' + (r.ok ? 'ok' : 'err');
  });

  $('save').addEventListener('click', async () => {
    cfg.pythonPath = $('python').value.trim() || 'python';
    cfg.tradingScript = $('script').value.trim();
    cfg.tradingArgs = $('args').value.trim();
    await window.api.saveConfig(cfg);
    $('status').textContent = '설정을 저장했어요.';
    $('status').className = 'status ok';
  });

  init();
</script>
</body>
</html>
